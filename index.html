<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Curitiba - Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-100: #f3e8ff;
    --purple-200: #e9d5ff;
    --purple-300: #d8b4fe;
    --purple-400: #c084fc;
    --purple-500: #a855f7;
    --purple-600: #9333ea;
    --purple-700: #7e22ce;
    --pink-400: #f472b6;
    --pink-500: #ec4899;
    --bg: #faf5ff;
    --card: #ffffff;
    --text: #1e1b2e;
    --text-muted: #8b85a0;
    --text-visited: #a78bfa;
    --shadow: 0 2px 12px rgba(120, 60, 180, 0.08);
    --shadow-lg: 0 8px 30px rgba(120, 60, 180, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    padding-bottom: 100px;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(135deg, #7c3aed 0%, #a855f7 40%, #ec4899 100%);
    padding: 20px 20px 24px;
    border-radius: 0 0 28px 28px;
    box-shadow: 0 8px 32px rgba(120, 40, 180, 0.25);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .header-title {
    color: white;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.85;
  }

  .header h1 {
    color: white;
    font-size: 28px;
    font-weight: 800;
    line-height: 1.2;
  }

  .header h1 span {
    font-weight: 500;
    font-size: 15px;
    opacity: 0.8;
    margin-left: 8px;
  }

  .progress-bar {
    margin-top: 16px;
    background: rgba(255,255,255,0.2);
    border-radius: 100px;
    height: 6px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: white;
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  .progress-text {
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    font-weight: 500;
    margin-top: 8px;
    text-align: right;
  }

  .tabs {
    display: flex;
    gap: 8px;
    padding: 16px 20px 4px;
    position: sticky;
    top: 130px;
    z-index: 90;
    background: var(--bg);
  }

  .tab {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
  }

  .tab.active-todo {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white;
    box-shadow: 0 4px 16px rgba(120, 40, 180, 0.3);
  }

  .tab.active-done {
    background: linear-gradient(135deg, #a855f7, #ec4899);
    color: white;
    box-shadow: 0 4px 16px rgba(200, 60, 140, 0.3);
  }

  .tab.inactive {
    background: white;
    color: var(--text-muted);
    box-shadow: var(--shadow);
  }

  .list {
    padding: 12px 16px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 16px 8px 8px;
  }

  .item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border-radius: 18px;
    padding: 16px 18px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, var(--purple-400), var(--pink-400));
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .item:hover::before,
  .item:active::before {
    opacity: 1;
  }

  .item:active {
    transform: scale(0.98);
  }

  .item.visited {
    background: linear-gradient(135deg, rgba(168,85,247,0.06), rgba(236,72,153,0.06));
  }

  .item.visited .item-name {
    color: var(--text-visited);
  }

  .checkbox {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2.5px solid var(--purple-300);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.3s ease;
    position: relative;
  }

  .checkbox.checked {
    border-color: transparent;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    animation: checkPop 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes checkPop {
    0% { transform: scale(1); }
    30% { transform: scale(1.25); }
    60% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  .checkbox svg {
    width: 14px;
    height: 14px;
    opacity: 0;
    transform: scale(0);
    transition: all 0.25s ease;
  }

  .checkbox.checked svg {
    opacity: 1;
    transform: scale(1);
  }

  .item-content {
    flex: 1;
    min-width: 0;
  }

  .item-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    transition: color 0.3s ease;
    line-height: 1.3;
  }

  .item-address {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .map-btn {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    background: var(--purple-100);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .map-btn:hover {
    background: linear-gradient(135deg, #a855f7, #ec4899);
    transform: scale(1.08);
    box-shadow: 0 4px 16px rgba(168, 85, 247, 0.35);
  }

  .map-btn:hover svg path {
    fill: white;
  }

  .map-btn svg {
    width: 18px;
    height: 18px;
  }

  .map-btn svg path {
    fill: var(--purple-500);
    transition: fill 0.3s ease;
  }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }

  .empty-state .emoji {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .empty-state p {
    font-size: 14px;
    font-weight: 500;
  }

  .counter-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.25);
    border-radius: 100px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 600;
    color: white;
    margin-left: 4px;
  }

  .item.entering {
    animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .number {
    width: 22px;
    height: 22px;
    border-radius: 7px;
    background: var(--purple-100);
    color: var(--purple-600);
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .item.visited .number {
    background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(236,72,153,0.15));
    color: var(--pink-500);
  }

  @media (min-width: 500px) {
    body { max-width: 430px; margin: 0 auto; box-shadow: 0 0 60px rgba(0,0,0,0.08); min-height: 100vh; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="header-title">Checklist de Viagem</span>
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="rgba(255,255,255,0.7)"/><circle cx="12" cy="9" r="2.5" fill="white"/></svg>
  </div>
  <h1>Curitiba <span id="counter"></span></h1>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText"></div>
</div>

<div class="tabs">
  <button class="tab active-todo" id="tabTodo" onclick="switchTab('todo')">A Visitar</button>
  <button class="tab inactive" id="tabDone" onclick="switchTab('done')">Visitados</button>
</div>

<div class="list" id="list"></div>

<script>
const places = [
  { id: 0, name: "Teatro Guaíra", address: "Praça Santos Andrade, Centro", query: "Teatro Guaíra Curitiba" },
  { id: 1, name: "Mercado Municipal", address: "Av. Sete de Setembro, 1865", query: "Mercado Municipal de Curitiba" },
  { id: 2, name: "Rua das Flores", address: "Rua XV de Novembro, Centro", query: "Rua das Flores Rua XV de Novembro Curitiba" },
  { id: 3, name: "Biblioteca Pública", address: "Rua Cândido Lopes, 133", query: "Biblioteca Pública do Paraná Curitiba" },
  { id: 4, name: "Passeio Público", address: "Rua Luiz Leão, Centro", query: "Passeio Público Curitiba" },
  { id: 5, name: "Cine Passeio", address: "Rua Riachuelo, 410", query: "Cine Passeio Curitiba" },
  { id: 6, name: "Centro Histórico", address: "Largo da Ordem, São Francisco", query: "Largo da Ordem Curitiba" },
  { id: 7, name: "Paço da Liberdade", address: "Praça Generoso Marques, 189", query: "Paço da Liberdade Curitiba" },
  { id: 8, name: "Feira do Largo", address: "Praça Garibaldi, São Francisco", query: "Feira do Largo da Ordem Curitiba" },
  { id: 9, name: "Rua Saldanha Marinho", address: "Centro, próx. à Catedral", query: "Rua Saldanha Marinho Curitiba Centro" },
  { id: 10, name: "Rua 24 Horas", address: "Rua Visconde de Nácar, Centro", query: "Rua 24 Horas Curitiba" },
  { id: 11, name: "Jardim Botânico", address: "R. Eng. Ostoja Roguski, 350", query: "Jardim Botânico de Curitiba" },
  { id: 12, name: "Museu Oscar Niemeyer", address: "Rua Mal. Hermes, 999", query: "Museu Oscar Niemeyer Curitiba" },
  { id: 13, name: "Bosque do Papa", address: "Rua Mateus Leme, Centro Cívico", query: "Bosque do Papa Memorial Polonês Curitiba" },
  { id: 14, name: "Torre Panorâmica", address: "R. Prof. Lycio G. C. Vellozo, 191", query: "Torre Panorâmica Curitiba" },
  { id: 15, name: "Bosque Alemão", address: "Rua Niccolo Paganini, Vista Alegre", query: "Bosque Alemão Curitiba" },
  { id: 16, name: "Parque Barigui", address: "Av. Cândido Hartmann, Santo Inácio", query: "Parque Barigui Curitiba" },
  { id: 17, name: "Parque Tingui", address: "Av. Fredolin Wolf, São João", query: "Parque Tingui Memorial Ucraniano Curitiba" },
  { id: 18, name: "Ópera de Arame", address: "Rua João Gava, 920, Abranches", query: "Ópera de Arame Curitiba" },
  { id: 19, name: "UNILIVRE", address: "Rua Victor Benato, 210, Pilarzinho", query: "Universidade Livre do Meio Ambiente Curitiba" },
  { id: 20, name: "Parque Tanguá", address: "R. Oswaldo Maciel, 97, Pilarzinho", query: "Parque Tanguá Curitiba" },
  { id: 21, name: "Santa Felicidade", address: "Av. Manoel Ribas, Portal Italiano", query: "Portal Italiano Santa Felicidade Curitiba" }
];

let visited = JSON.parse(localStorage.getItem('cwb_visited') || '[]');
let currentTab = 'todo';

function save() {
  localStorage.setItem('cwb_visited', JSON.stringify(visited));
}

function isVisited(id) {
  return visited.includes(id);
}

function toggle(id) {
  if (visited.includes(id)) {
    visited = visited.filter(v => v !== id);
  } else {
    visited.push(id);
  }
  save();
  render();
}

function openMap(e, query) {
  e.stopPropagation();
  window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`, '_blank');
}

function switchTab(tab) {
  currentTab = tab;
  const tabTodo = document.getElementById('tabTodo');
  const tabDone = document.getElementById('tabDone');
  if (tab === 'todo') {
    tabTodo.className = 'tab active-todo';
    tabDone.className = 'tab inactive';
  } else {
    tabTodo.className = 'tab inactive';
    tabDone.className = 'tab active-done';
  }
  render();
}

function render() {
  const list = document.getElementById('list');
  const total = places.length;
  const done = visited.length;
  const pct = Math.round((done / total) * 100);

  document.getElementById('counter').textContent = `${done}/${total}`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = pct === 100 ? 'Todos visitados!' : `${pct}% concluído`;

  const tabTodo = document.getElementById('tabTodo');
  const tabDone = document.getElementById('tabDone');
  tabTodo.innerHTML = `A Visitar <span class="counter-badge">${total - done}</span>`;
  tabDone.innerHTML = `Visitados <span class="counter-badge">${done}</span>`;

  if (currentTab === 'todo') {
    tabTodo.className = 'tab active-todo';
    tabDone.className = 'tab inactive';
  } else {
    tabTodo.className = 'tab inactive';
    tabDone.className = 'tab active-done';
  }

  const filtered = places.filter(p => currentTab === 'todo' ? !isVisited(p.id) : isVisited(p.id));

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="emoji">${currentTab === 'todo' ? '🎉' : '🗺️'}</div>
        <p>${currentTab === 'todo' ? 'Todos os lugares foram visitados!' : 'Nenhum lugar visitado ainda'}</p>
      </div>`;
    return;
  }

  let html = '';
  filtered.forEach((p, i) => {
    const checked = isVisited(p.id);
    const idx = places.indexOf(p) + 1;
    html += `
      <div class="item ${checked ? 'visited' : ''} entering" style="animation-delay:${i * 40}ms" onclick="toggle(${p.id})">
        <div class="number">${idx}</div>
        <div class="checkbox ${checked ? 'checked' : ''}">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M5 13l4 4L19 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="item-content">
          <div class="item-name">${p.name}</div>
          <div class="item-address">${p.address}</div>
        </div>
        <button class="map-btn" onclick="openMap(event, '${p.query.replace(/'/g, "\\'")}')">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
        </button>
      </div>`;
  });

  list.innerHTML = html;
}

render();
</script>
</body>
</html>
